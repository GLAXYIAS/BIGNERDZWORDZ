<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My NERDZY Thing</title>
  <style>
    body { font-family: Arial, sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; text-align: center; }
    h1 { color: #00ff9d; }
    input { width: 80%; max-width: 600px; padding: 15px; font-size: 18px; border: none; border-radius: 8px; margin: 20px 0; }
    button { padding: 15px 30px; font-size: 18px; background: #00ff9d; color: black; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #00cc7a; }
    #frame { width: 100%; height: 80vh; border: none; margin-top: 20px; display: none; }
    .container { max-width: 800px; margin: auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Custom Proxy</h1>
    <p>Enter a URL below (e.g., https://google.com)</p>
    <input id="urlInput" type="text" placeholder="https://example.com" autofocus/>
    <button onclick="proxyGo()">Go</button>

    <iframe id="frame" allowfullscreen></iframe>
  </div>

  <!-- Ultraviolet scripts - using public CDN-hosted bundle -->
  <script src="https://cdn.jsdelivr.net/gh/titaniumnetwork-dev/Ultraviolet@latest/dist/uv.bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/titaniumnetwork-dev/Ultraviolet@latest/dist/uv.config.js"></script>
  <script>
    // Register the service worker once
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/uv.sw.js', { scope: '/' }).then(reg => {
        console.log('Service Worker registered!');
      }).catch(err => console.error('SW error:', err));
    }

    // Simple go function
    function proxyGo() {
      let url = document.getElementById('urlInput').value.trim();
      if (!url) return alert('Enter a URL!');
      if (!url.startsWith('http')) url = 'https://' + url;

      // Use Ultraviolet to encode and load
      const encoded = __uv$config.encodeUrl(url);
      const proxied = __uv$config.prefix + encoded;

      const frame = document.getElementById('frame');
      frame.src = proxied;
      frame.style.display = 'block';
    }
  </script>
</body>
</html>
